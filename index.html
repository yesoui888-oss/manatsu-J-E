<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🐾 Learn Japanese with Manatsu Sensei</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Noto+Serif+JP:wght@700&display=swap');
:root{
  --red:#E8342A; --gold:#F5C518; --navy:#0d1f3c;
  --dark:#07111f; --card:rgba(255,255,255,.07); --border:rgba(255,255,255,.13);
  --teal:#4ECDC4; --pink:#E8567A;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Outfit',sans-serif;background:#111;min-height:100vh;display:flex;justify-content:center;align-items:center;}
 
.phone{width:390px;height:693px;background:var(--dark);border-radius:40px;overflow:hidden;position:relative;box-shadow:0 40px 80px rgba(0,0,0,.8),inset 0 0 0 1.5px rgba(255,255,255,.08);}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .3s;overflow:hidden;}
.screen.active{opacity:1;pointer-events:all;}
 
/* HOME */
#home{
  background:linear-gradient(170deg,#f5f0ff 0%,#e8d5ff 40%,#d0eeff 100%);
  align-items:center;justify-content:center;padding:14px 26px;gap:8px;
}
.h-flag{font-size:30px;line-height:1;}
.h-title{font-size:22px;font-weight:900;color:#2a0060;text-align:center;line-height:1.3;}
.h-sub{font-size:12px;color:#6030a0;font-weight:600;}
.dog-wrap{position:relative;width:148px;height:148px;}
.blob{position:absolute;inset:-10px;background:radial-gradient(ellipse,rgba(120,60,220,.22) 0%,transparent 68%);border-radius:50%;animation:blobP 3.5s ease-in-out infinite;}
@keyframes blobP{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.1);opacity:1}}
.dog-img{width:100%;height:100%;object-fit:contain;position:relative;z-index:1;animation:fl 4s ease-in-out infinite;filter:drop-shadow(0 8px 16px rgba(120,60,220,.25));}
@keyframes fl{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-10px) rotate(2deg)}}
.bubble{background:#fff;border-radius:20px;padding:11px 16px;position:relative;box-shadow:0 5px 18px rgba(100,50,200,.15);max-width:255px;text-align:center;}
.bubble::before{content:'';position:absolute;top:-9px;left:50%;transform:translateX(-50%);border:9px solid transparent;border-bottom-color:#fff;border-top:0;}
.bubble p{font-size:13px;color:#2a0060;line-height:1.65;font-weight:600;}
.bubble .jp{font-size:17px;font-family:'Noto Serif JP',serif;font-weight:700;color:#7030c0;display:block;margin-top:3px;}
.menu{display:grid;grid-template-columns:1fr 1fr;gap:9px;width:100%;max-width:278px;}
.mbtn{background:#fff;border:none;border-radius:20px;padding:12px 10px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;color:#3a0080;box-shadow:0 4px 14px rgba(100,50,200,.15);display:flex;flex-direction:column;align-items:center;gap:5px;transition:transform .15s;-webkit-tap-highlight-color:transparent;}
.mbtn:active{transform:scale(.93);}
.mbtn .mic{font-size:22px;}
.mbtn.prim{background:linear-gradient(135deg,#7030c0,#4010a0);color:#fff;grid-column:span 2;font-size:15px;padding:15px;}
 
/* SHARED */
.tbar{display:flex;align-items:center;justify-content:space-between;padding:28px 18px 6px;z-index:5;flex-shrink:0;}
.bk{background:rgba(255,255,255,.1);border:none;width:36px;height:36px;border-radius:12px;cursor:pointer;font-size:16px;color:#fff;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;}
.tbar-title{font-size:14px;font-weight:700;color:#fff;}
 
/* LESSON */
#lesson{background:linear-gradient(180deg,#120820 0%,#1a0830 100%);}
.ldots{display:flex;gap:5px;}
.ldot{width:7px;height:7px;border-radius:4px;background:rgba(255,255,255,.25);transition:all .3s;}
.ldot.on{background:#9050e0;width:20px;}
.ldot.done{background:var(--gold);}
.lbody{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 20px 14px;gap:11px;}
.ldog{width:105px;height:105px;object-fit:contain;filter:drop-shadow(0 0 20px rgba(144,80,224,.4));animation:fl 3s ease-in-out infinite;}
.lcard{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:16px;width:100%;text-align:center;position:relative;}
.le{font-size:30px;display:block;margin-bottom:5px;}
.lt{font-family:'Noto Serif JP',serif;font-size:36px;font-weight:700;color:#fff;display:block;text-shadow:0 0 22px rgba(144,80,224,.5);margin-bottom:3px;}
.lr{font-size:12px;color:rgba(255,255,255,.4);font-style:italic;display:block;margin-bottom:3px;}
.lj{font-size:17px;font-weight:700;color:var(--gold);display:block;}
.spkbtn{position:absolute;top:10px;right:12px;background:rgba(255,255,255,.12);border:none;border-radius:11px;width:35px;height:35px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;-webkit-tap-highlight-color:transparent;}
.spkbtn.s,.qspk.s{animation:spkP .55s ease-in-out infinite alternate;}
@keyframes spkP{from{transform:scale(1)}to{transform:scale(1.18)}}
.lspeech{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:10px 14px;font-size:13px;color:rgba(255,255,255,.8);line-height:1.7;width:100%;text-align:center;font-weight:500;}
.nbtn{background:linear-gradient(135deg,#7030c0,#4010a0);border:none;border-radius:20px;padding:13px 36px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;color:#fff;cursor:pointer;box-shadow:0 7px 22px rgba(112,48,192,.4);-webkit-tap-highlight-color:transparent;}
.nbtn:active{transform:scale(.94);}
 
/* QUIZ */
#quiz{background:radial-gradient(ellipse at 50% 0%,#1a0830 0%,#07111f 65%);}
.qtop{display:flex;align-items:center;justify-content:space-between;padding:26px 18px 5px;flex-shrink:0;}
.sbadge{background:linear-gradient(135deg,var(--gold),#c09000);border-radius:18px;padding:6px 15px;font-size:14px;font-weight:800;color:#3a2000;}
.cdwrap{position:relative;width:52px;height:52px;display:flex;align-items:center;justify-content:center;}
.cdsvg{position:absolute;inset:0;transform:rotate(-90deg);}
.cdt{fill:none;stroke:rgba(255,255,255,.1);stroke-width:3.5;}
.cdf{fill:none;stroke:#9050e0;stroke-width:3.5;stroke-linecap:round;stroke-dasharray:125.6;stroke-dashoffset:0;transition:stroke .25s;}
.cdn{font-size:18px;font-weight:900;color:#fff;position:relative;z-index:1;}
.cdn.urg{color:#ff3355;}
.cdf.urg{stroke:#ff3355;}
.qprog{width:100%;height:3px;background:rgba(255,255,255,.07);flex-shrink:0;}
.qprogfill{height:100%;background:linear-gradient(90deg,#7030c0,var(--gold));transition:width .3s ease;}
.qbody{flex:1;display:flex;flex-direction:column;align-items:center;padding:0 15px 10px;gap:7px;min-height:0;}
.qdog{width:68px;height:68px;object-fit:contain;filter:drop-shadow(0 0 12px rgba(144,80,224,.4));animation:fl 3s ease-in-out infinite;flex-shrink:0;}
.qcard{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:12px 15px;width:100%;text-align:center;position:relative;flex-shrink:0;}
.qhook{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:3px;opacity:.85;}
.qthai{font-family:'Noto Serif JP',serif;font-size:38px;font-weight:700;color:#fff;display:block;text-shadow:0 0 24px rgba(144,80,224,.6);line-height:1.15;}
.qrow{display:flex;align-items:center;justify-content:center;gap:10px;margin:4px 0 2px;}
.qspk{background:rgba(144,80,224,.18);border:1px solid rgba(144,80,224,.35);border-radius:11px;padding:4px 12px;cursor:pointer;color:#c090ff;font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;display:flex;align-items:center;gap:4px;-webkit-tap-highlight-color:transparent;}
.qno{font-size:11px;color:rgba(255,255,255,.4);font-weight:600;}
.qhint{font-size:13px;color:rgba(255,255,255,.55);display:block;font-weight:500;}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:7px;width:100%;flex-shrink:0;position:relative;z-index:5;}
.opt{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.14);border-radius:18px;padding:13px 8px;cursor:pointer;font-family:'Outfit',sans-serif;font-weight:700;color:#fff;display:flex;flex-direction:column;align-items:center;gap:5px;transition:all .18s;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden;}
.opt .oe{font-size:22px;}
.opt .ot{font-size:15px;font-weight:700;opacity:.95;text-align:center;line-height:1.35;}
.opt:active{transform:scale(.94);}
.opt.correct{background:rgba(245,197,24,.25);border-color:var(--gold);box-shadow:0 0 18px rgba(245,197,24,.35);}
.opt.correct::after{content:'';position:absolute;inset:0;background:radial-gradient(circle,rgba(245,197,24,.35) 0%,transparent 70%);animation:rpl .5s ease-out;}
@keyframes rpl{from{transform:scale(0);opacity:1}to{transform:scale(2.8);opacity:0}}
.opt.wrong{background:rgba(232,52,42,.22);border-color:var(--red);}
.opt.reveal{background:rgba(245,197,24,.07);border-color:rgba(245,197,24,.2);opacity:.65;}
.fb{width:100%;border-radius:16px;padding:8px 14px;text-align:center;font-size:13px;font-weight:700;opacity:0;transition:opacity .28s;min-height:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;z-index:5;}
.fb.show{opacity:1;}
.fb.ok{background:rgba(245,197,24,.18);color:var(--gold);border:1px solid rgba(245,197,24,.3);}
.fb.ng{background:rgba(232,52,42,.18);color:#ff8877;border:1px solid rgba(232,52,42,.3);}
.qnb{background:linear-gradient(135deg,#7030c0,#4010a0);border:none;border-radius:18px;padding:11px 36px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;color:#fff;cursor:pointer;box-shadow:0 7px 20px rgba(112,48,192,.35);visibility:hidden;opacity:0;transition:opacity .22s;-webkit-tap-highlight-color:transparent;flex-shrink:0;position:relative;z-index:5;}
.qnb.show{visibility:visible;opacity:1;}
.qnb:active{transform:scale(.94);}
.tmo{position:absolute;inset:0;background:rgba(232,52,42,.14);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;z-index:2;border-radius:22px;}
.tmo.show{opacity:1;}
.tmo-t{font-size:24px;font-weight:900;color:#ff4433;text-shadow:0 0 18px rgba(255,50,50,.7);animation:shk .3s ease;}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
 
/* RESULT */
#result{background:radial-gradient(ellipse at 50% 30%,#1a0830 0%,#07111f 70%);align-items:center;justify-content:center;padding:22px 28px;gap:8px;text-align:center;}
.rstars{font-size:34px;animation:stP .5s cubic-bezier(.17,.67,.28,1.4);}
@keyframes stP{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.rdog{width:138px;height:138px;object-fit:contain;filter:drop-shadow(0 0 28px rgba(245,197,24,.45));animation:cel .5s ease infinite alternate;}
@keyframes cel{from{transform:rotate(-5deg) scale(1)}to{transform:rotate(5deg) scale(1.06)}}
.rtitle{font-size:23px;font-weight:900;color:#fff;}
.rscore{font-size:50px;font-weight:900;background:linear-gradient(135deg,var(--gold),#c09000);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1;}
.rmsg{font-size:13px;color:rgba(255,255,255,.65);line-height:1.75;max-width:245px;font-weight:500;}
.rbtns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:265px;}
.rr{background:linear-gradient(135deg,#7030c0,#4010a0);border:none;border-radius:20px;padding:14px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;color:#fff;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.rh{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:20px;padding:13px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;color:rgba(255,255,255,.65);cursor:pointer;-webkit-tap-highlight-color:transparent;}
.cp{position:absolute;pointer-events:none;animation:cf linear forwards;}
@keyframes cf{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(710px) rotate(720deg);opacity:0}}
</style>
</head>

var ord=[],li=0,qi=0,sc=0,ans=false;
var spkBtn=null,ttsOK=('speechSynthesis' in window);
var cdIv=null,cdL=10,CIRC=125.6;
 
var ac=null;
function gAC(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();return ac;}
function tone(f,d,t,v){try{var a=gAC(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||.3,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+d);o.start();o.stop(a.currentTime+d);}catch(e){}}
function sndTick(){tone(900,.07,'square',.11);}
function sndUrg(){tone(660,.09,'square',.21);}
function sndOK(){[523,659,784,1047].forEach(function(f,i){setTimeout(function(){tone(f,.22,'sine',.32);},i*95);});}
function sndNG(){tone(280,.14,'sawtooth',.27);setTimeout(function(){tone(200,.22,'sawtooth',.21);},140);}
function sndTO(){tone(440,.07,'square',.27);setTimeout(function(){tone(330,.07,'square',.27);},95);setTimeout(function(){tone(220,.28,'square',.27);},190);}
 
function getBestJaVoice(){
  var vs=speechSynthesis.getVoices();
  var preferred=['Kyoko','O-ren','Hattori','Google 日本語','Microsoft Haruka','ja-JP'];
  // First try preferred voices by name
  for(var p=0;p<preferred.length;p++){
    for(var i=0;i<vs.length;i++){
      if(vs[i].name.indexOf(preferred[p])!==-1&&(vs[i].lang==='ja-JP'||vs[i].lang.startsWith('ja'))){
        return vs[i];
      }
    }
  }
  // Fallback: any Japanese voice
  for(var i=0;i<vs.length;i++){
    if(vs[i].lang==='ja-JP'||vs[i].lang.startsWith('ja')){return vs[i];}
  }
  return null;
}
 
function spk(txt,btn){
  if(!ttsOK)return;
  speechSynthesis.cancel();
  if(spkBtn)spkBtn.classList.remove('s');
  var u=new SpeechSynthesisUtterance(txt);
  u.lang='ja-JP';
  u.rate=0.75;
  u.pitch=1.0;
  u.volume=1.0;
  var bestVoice=getBestJaVoice();
  if(bestVoice)u.voice=bestVoice;
  if(btn){btn.classList.add('s');spkBtn=btn;u.onend=u.onerror=function(){btn.classList.remove('s');spkBtn=null;};}
  speechSynthesis.speak(u);
}
function speakL(){spk(lessons[li].sp||lessons[li].thai,document.getElementById('spkL'));}
function speakQ(){spk(allQ[ord[qi]].thai,document.getElementById('spkQ'));}
 
function ss(id){
  stopCD();
  if(ttsOK)speechSynthesis.cancel();
  if(spkBtn){spkBtn.classList.remove('s');spkBtn=null;}
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById(id).classList.add('active');
}
function goHome(){ss('home');}
 
function startCD(){
  stopCD();cdL=10;updCD();
  cdIv=setInterval(function(){
    cdL--;
    if(cdL<=3)sndUrg();else sndTick();
    updCD();
    if(cdL<=0){stopCD();onTO();}
  },1000);
}
function stopCD(){if(cdIv){clearInterval(cdIv);cdIv=null;}}
function updCD(){
  var n=document.getElementById('cdn'),f=document.getElementById('cdf');
  if(!n||!f)return;
  n.textContent=cdL;
  f.style.strokeDashoffset=CIRC*(1-cdL/10);
  var u=cdL<=3;
  n.className='cdn'+(u?' urg':'');
  f.className='cdf'+(u?' urg':'');
}
function onTO(){
  if(ans)return;ans=true;sndTO();
  document.getElementById('tmo').className='tmo show';
  var q=allQ[ord[qi]];
  document.getElementById('og').querySelectorAll('.opt').forEach(function(b){
    b.classList.add(b.querySelector('.ot').textContent===q.correct?'correct':'reveal');
  });
  var fb=document.getElementById('fb');
  fb.className='fb ng show';
  fb.textContent="⏰ Times up！ Answer: "+q.correct;
  document.getElementById('qnb').className='qnb show';
}
 
function confetti(){
  var p=document.querySelector('.phone');
  var cols=['#FFD700','#9050e0','#FF69B4','#4ECDC4','#FF6B6B','#fff'];
  for(var i=0;i<42;i++){(function(i){setTimeout(function(){
    var el=document.createElement('div');el.className='cp';
    var sz=Math.random()*9+4;
    el.style.cssText='left:'+Math.random()*390+'px;top:-8px;width:'+sz+'px;height:'+sz+'px;background:'+cols[Math.floor(Math.random()*cols.length)]+';border-radius:'+(Math.random()>.5?'50%':'3px')+';animation-duration:'+(Math.random()*1.6+1)+'s;';
    p.appendChild(el);setTimeout(function(){el.remove();},3200);
  },i*38);})(i);}
}
 
function dogR(ok){
  var d=document.getElementById('qdog');if(!d)return;
  d.style.animation='none';
  if(ok){d.style.transform='scale(1.3) rotate(10deg)';d.style.filter='drop-shadow(0 0 22px rgba(245,197,24,.9))';}
  else{d.style.transform='rotate(-16deg)';d.style.filter='drop-shadow(0 0 18px rgba(232,52,42,.8))';}
  setTimeout(function(){d.style.transform='';d.style.filter='drop-shadow(0 0 12px rgba(144,80,224,.4))';d.style.animation='fl 3s ease-in-out infinite';},580);
}
 
function shuf(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
function startQuiz(){qi=0;sc=0;ans=false;ord=shuf(Array.from({length:allQ.length},function(_,i){return i;}));ss('quiz');renderQ();}
function restartQ(){ord=shuf(Array.from({length:allQ.length},function(_,i){return i;}));qi=0;sc=0;ans=false;ss('quiz');renderQ();}
 
function renderQ(){
  ans=false;
  document.getElementById('tmo').className='tmo';
  var q=allQ[ord[qi]],tot=allQ.length;
  document.getElementById('qt').textContent=q.thai;
  document.getElementById('qh').textContent='Hint: '+q.hint;
  document.getElementById('qno').textContent=(qi+1)+'/'+tot;
  document.getElementById('sd').textContent=sc;
  document.getElementById('fb').className='fb';document.getElementById('fb').textContent='';
  document.getElementById('qnb').className='qnb';
  document.getElementById('qpf').style.width=((qi/tot)*100)+'%';
  var og=document.getElementById('og');og.innerHTML='';
  for(var i=0;i<q.options.length;i++){
    (function(op,em){
      var b=document.createElement('button');b.className='opt';
      b.innerHTML='<span class="oe">'+em+'</span><span class="ot">'+op+'</span>';
      b.addEventListener('click',function(){selA(op,b);});
      og.appendChild(b);
    })(q.options[i],q.emoji[i]);
  }
  if(ttsOK){if(speechSynthesis.speaking){speechSynthesis.cancel();}setTimeout(function(){var q2=allQ[ord[qi]];spk(q2.thai,document.getElementById('spkQ'));},400);setTimeout(function(){startCD();},1300);}
  else setTimeout(function(){startCD();},380);
}
 
function selA(ch,btn){
  if(ans)return;ans=true;stopCD();
  var q=allQ[ord[qi]],ok=(ch===q.correct);
  document.getElementById('og').querySelectorAll('.opt').forEach(function(b){
    var lb=b.querySelector('.ot').textContent;
    if(lb===q.correct)b.classList.add('correct');
    else if(b===btn&&!ok)b.classList.add('wrong');
    else b.classList.add('reveal');
  });
  var fb=document.getElementById('fb');
  if(ok){sc++;sndOK();dogR(true);confetti();fb.className='fb ok show';fb.textContent="🎉 Correct！Manatsu is so happy！";}
  else{sndNG();dogR(false);fb.className='fb ng show';fb.textContent="💪 Almost！ Answer: "+q.correct;}
  document.getElementById('sd').textContent=sc;
  document.getElementById('qnb').className='qnb show';
}
 
function nextQ(){qi++;if(qi<allQ.length)renderQ();else showR();}
 
function showR(){
  ss('result');confetti();
  var tot=allQ.length,p=sc/tot,s,t,m;
  if(p===1){s="⭐⭐⭐";t="Perfect！🎉";m="All correct！ Incredible！<br>Manatsu is so proud of you 🐾<br>Ready for the next level！";}
  else if(p>=.8){s="⭐⭐⭐";t="Awesome！🎊";m="Over 80% correct！ Fantastic！<br>Manatsu gives you a big paw 🐾";}
  else if(p>=.6){s="⭐⭐";t="Well done！";m="Getting there！ Keep it up！<br>Try again and beat your score 🐾";}
  else{s="⭐";t="Keep going！";m="Review the lessons and try again！<br>Manatsu believes in you 🐾";}
  document.getElementById('rs').textContent=s;
  document.getElementById('rt').textContent=t;
  document.getElementById('rsc').textContent=sc+'/'+tot;
  document.getElementById('rm').innerHTML=m;
}
 
function startLesson(){li=0;ss('lesson');renderL();}
function renderL(){
  var l=lessons[li];
  document.getElementById('lE').textContent=l.emoji;
  document.getElementById('lT').textContent=l.thai;
  document.getElementById('lR').textContent=l.rom;
  document.getElementById('lJ').textContent=l.jp;
  document.getElementById('lS').innerHTML=l.tx.replace(/\n/g,'<br>');
  document.getElementById('lBtn').textContent=li<lessons.length-1?'Next →':'Start Quiz！🎯';
  var de=document.getElementById('ldots');de.innerHTML='';
  for(var i=0;i<lessons.length;i++){var d=document.createElement('div');d.className='ldot'+(i===li?' on':i<li?' done':'');de.appendChild(d);}
  if(ttsOK)setTimeout(function(){speakL();},550);
}
function nextL(){if(li<lessons.length-1){li++;renderL();}else startQuiz();}
 
if(ttsOK){
  // Warm up voices on load
  speechSynthesis.getVoices();
  if(speechSynthesis.onvoiceschanged!==undefined){
    speechSynthesis.onvoiceschanged=function(){
      speechSynthesis.getVoices();
    };
  }
  // iOS Safari fix: silent utterance to unlock TTS on first user interaction
  document.addEventListener('touchstart',function(){
    var u=new SpeechSynthesisUtterance('');
    u.volume=0;
    speechSynthesis.speak(u);
  },{once:true});
}
